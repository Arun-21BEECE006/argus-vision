<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Argus Vision{% endblock %}</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{ url_for('static', filename='images/favicon.svg') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <header class="nav">
      <a class="brand" href="{{ url_for('index') }}">
        <img
          src="{{ url_for('static', filename='images/logo2.png') }}"
          alt="Argus Vision Logo"
          class="brand-logo"
        />
        <span class="brand-name">
          ARGUS<span class="brand-name-2">VISION</span>
        </span>
      </a>
      <!-- <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-eye" aria-hidden="true"></span>
        <span class="brand-name"
          >ARGUS<span class="brand-name-2">VISION</span></span
        >
      </a> -->
      <nav class="nav-links">
        <a href="{{ url_for('page_image') }}">Image</a>
        <a href="{{ url_for('page_video') }}">Video</a>
        <a href="{{ url_for('page_webcam') }}">Live Camera</a>
        <a href="{{ url_for('page_rtsp') }}">RTSP</a>
      </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer">
      <span class="mono">ARGUS VISION</span>
      <span class="footer-dot">·</span>
      <span>Real-time object detection · YOLO11 · 80 COCO classes</span>
    </footer>

    {% block scripts %}{% endblock %}
  </body>
</html>
