<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0b0f1a"/>

  <!-- Eye almond shape -->
  <path d="M3,16 C5,9 11,7 16,7 C21,7 27,9 29,16 C27,23 21,25 16,25 C11,25 5,23 3,16 Z"
        fill="#0b1a24" stroke="#14b8a6" stroke-width="1.5"/>

  <!-- Iris -->
  <circle cx="16" cy="16" r="5.5" fill="#0d9488"/>

  <!-- Pupil -->
  <circle cx="16" cy="16" r="3" fill="#0b0f1a"/>

  <!-- Highlight dot -->
  <circle cx="17.5" cy="14.5" r="1" fill="white" opacity="0.85"/>

  <!-- Corner scan brackets (amber) -->
  <!-- Top-left -->
  <path d="M3,7 L3,3 L7,3" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <path d="M25,3 L29,3 L29,7" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <path d="M3,25 L3,29 L7,29" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <path d="M29,25 L29,29 L25,29" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
